<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hey</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400;700&family=Poppins:wght@300;600&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #e25dc8 0%, #4ba293 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-family: 'Poppins', sans-serif;
            overflow: hidden;
            position: relative;
        }

        /* Animated background particles */
        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                radial-gradient(2px 2px at 20px 30px, #fff, transparent),
                radial-gradient(2px 2px at 40px 70px, rgba(255,255,255,0.8), transparent),
                radial-gradient(1px 1px at 90px 40px, #fff, transparent),
                radial-gradient(1px 1px at 130px 80px, rgba(255,255,255,0.6), transparent);
            background-repeat: repeat;
            background-size: 200px 100px;
            animation: sparkle 20s linear infinite;
            opacity: 0.3;
        }

        @keyframes sparkle {
            0% { transform: translateY(0px) rotate(0deg); }
            100% { transform: translateY(-100px) rotate(360deg); }
        }

        .container {
            text-align: center;
            position: relative;
            z-index: 10;
        }

        h1 {
            color: rgb(237, 212, 229);
            font-size: 3.5rem;
            margin-bottom: 3rem;
            font-family: 'clavasta';
            text-shadow: 0 4px 8px rgba(34, 11, 14, 0.3);
            animation: fadeInUp 1s ease-out;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .love-btn {
            background: linear-gradient(45deg, #ff6b9d, #ff8e8e, #ff6b9d);
            border: none;
            padding: 18px 40px;
            font-size: 1.4rem;
            font-weight: 600;
            color: white;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 
                0 10px 30px rgba(255, 107, 157, 0.4),
                inset 0 2px 0 rgba(255,255,255,0.3);
            transition: all 0.3s ease;
            font-family: 'barni', cursive;
            position: relative;
            overflow: hidden;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .love-btn:hover {
            transform: translateY(-5px);
            box-shadow: 
                0 20px 40px rgba(255, 107, 157, 0.6),
                inset 0 2px 0 rgba(255,255,255,0.4);
        }

        .love-btn:active {
            transform: translateY(-2px);
        }

        /* Heart Typography Container */
        .heart-reveal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0);
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            visibility: hidden;
            transition: all 0.6s ease;
            z-index: 1000;
        }

        .heart-reveal.active {
            opacity: 1;
            visibility: visible;
        }

        .heart-typography {
            font-family: 'Dancing Script', cursive;
            font-size: clamp(3rem, 12vw, 8rem);
            font-weight: 700;
            background: linear-gradient(45deg, #ff1744, #ff6b9d, #ff8e8e, #ff1744);
            background-size: 300% 300%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-align: center;
            line-height: 0.9;
            animation: 
                heartBeat 1.5s ease-in-out infinite,
                gradientShift 3s ease infinite;
            transform: rotate(-45deg);
            opacity: 0;
            animation-delay: 0.3s;
        }

        .heart-reveal.active .heart-typography {
            opacity: 1;
        }

        @keyframes heartBeat {
            0%, 100% { transform: rotate(-45deg) scale(1); }
            14% { transform: rotate(-45deg) scale(1.25); }
            28% { transform: rotate(-45deg) scale(1); }
            42% { transform: rotate(-45deg) scale(1.25); }
            70% { transform: rotate(-45deg) scale(1); }
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Close button */
        .close-btn {
            position: absolute;
            top: 30px;
            right: 30px;
            background: rgba(255,255,255,0.2);
            border: 2px solid rgba(255,255,255,0.5);
            color: white;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            font-size: 1.2rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
        }

        .close-btn:hover {
            background: rgba(255,255,255,0.3);
            transform: scale(1.1);
        }

        /* Floating hearts */
        .floating-hearts {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 999;
        }

        .heart-float {
            position: absolute;
            font-size: 20px;
            color: #ff6b9d;
            animation: floatUp 3s ease-out forwards;
        }

        @keyframes floatUp {
            0% {
                opacity: 1;
                transform: translateY(0) scale(0);
            }
            50% {
                opacity: 1;
                transform: translateY(-50px) scale(1);
            }
            100% {
                opacity: 0;
                transform: translateY(-200px) scale(0);
            }
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 2rem;
            }
            .love-btn {
                padding: 15px 30px;
                font-size: 1.2rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Hey, I Wanna Say</h1>
        <button class="love-btn" id="loveBtn">here</button>
    </div>

    <!-- Heart Reveal Overlay -->
    <div class="heart-reveal" id="heartReveal">
        <button class="close-btn" id="closeBtn">&times;</button>
        <div class="heart-typography" id="heartText">
            I<br>
            Miss<br>
            You<br>
            Can I Call ?
        </div>
    </div>

    <!-- Floating Hearts Container -->
    <div class="floating-hearts" id="floatingHearts"></div>

    <script>
        const loveBtn = document.getElementById('loveBtn');
        const heartReveal = document.getElementById('heartReveal');
        const closeBtn = document.getElementById('closeBtn');
        const heartText = document.getElementById('heartText');
        const floatingHearts = document.getElementById('floatingHearts');

        // Button click - show heart
        loveBtn.addEventListener('click', () => {
            heartReveal.classList.add('active');
            
            // Create floating hearts
            createFloatingHearts();
            
            // Sound effect (optional - uncomment if you want)
            // playHeartSound();
        });

        // Close button
        closeBtn.addEventListener('click', () => {
            heartReveal.classList.remove('active');
        });

        // Click outside to close
        heartReveal.addEventListener('click', (e) => {
            if (e.target === heartReveal) {
                heartReveal.classList.remove('active');
            }
        });

        // Create floating hearts animation
        function createFloatingHearts() {
            for (let i = 0; i < 15; i++) {
                setTimeout(() => {
                    const heart = document.createElement('div');
                    heart.className = 'heart-float';
                    heart.innerHTML = ['💖', '💕', '💗', '💝', '✨'][Math.floor(Math.random() * 5)];
                    heart.style.left = Math.random() * 100 + '%';
                    heart.style.animationDelay = Math.random() * 0.5 + 's';
                    floatingHearts.appendChild(heart);

                    // Remove heart after animation
                    setTimeout(() => {
                        heart.remove();
                    }, 3000);
                }, i * 100);
            }
        }

        // Optional: Heart sound effect (requires audio file)
        /*
        function playHeartSound() {
            const audio = new Audio('heart-sound.mp3');
            audio.play().catch(e => console.log('Audio play failed'));
        }
        */

        // Keyboard ESC to close
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' && heartReveal.classList.contains('active')) {
                heartReveal.classList.remove('active');
            }
        });
    </script>
</body>
</html>
